<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#070b12">
  <title>404 | Moe-Kyaw-Aung-Portfolio V3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <main class="section" style="min-height:100vh;display:grid;place-items:center;">
    <div class="container">
      <div class="card reveal" style="padding:32px;text-align:center;max-width:720px;margin-inline:auto;">
        <span class="badge">
          <i class="fa-solid fa-triangle-exclamation"></i>
          Page not found
        </span>
        <h1 style="font-size:clamp(2.4rem,6vw,5rem);margin:16px 0 10px;">404</h1>
        <p style="color:var(--muted);max-width:58ch;margin:0 auto 20px;">
          The page you tried to open does not exist or was moved. Use the button below to return to the homepage.
        </p>
        <a class="btn btn-primary" href="index.html">
          <i class="fa-solid fa-house"></i>
          Go Home
        </a>
      </div>
    </div>
  </main>
  <script src="assets/js/main.js" defer></script>
</body>
</html>
